<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <button class="nav-toggle" aria-label="Toggle navigation"
            onclick="this.nextElementSibling.classList.toggle('open')">≡</button>
    <ul class="nav-links">
      {% for item in site.nav %}
        {% if item.children %}
          <li class="nav-has-children">
            <a href="{{ item.url | relative_url }}">{{ item.title }}<span class="nav-caret" aria-hidden="true">▾</span></a>
            <ul class="nav-dropdown">
              {% for sub in item.children %}
                <li><a href="{{ sub.url | relative_url }}">{{ sub.title }}</a></li>
              {% endfor %}
            </ul>
          </li>
        {% else %}
          <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>
</nav>
